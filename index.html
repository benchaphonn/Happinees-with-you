<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happiness with You</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">
    <div class="card">

      <div id="emojiArea"></div>

      <div class="left">
        <img src="image/ss17.png" class="couple" alt="couple">
      </div>

      <div class="right">

        <h1>꒰ 𝐇𝐚𝐩𝐩𝐢𝐧𝐞𝐬𝐬 𝐰𝐢𝐭𝐡 𝐘𝐨𝐮 ꒱</h1>
  
        <p>˚◡̈ คำใบ้ : เป็นตัวเลข 6 ตัว *.❅•</p>
    
        <p class="wrong-text" id="wrongText"></p>
    
        <div class="keypad-container">
    
            <div class="pass-box" id="passBox">
                <span>*</span>
                <span>*</span>
                <span>*</span>
                <span>*</span>
                <span>*</span>
                <span>*</span>
            </div>
    
            <div class="keypad">
                <button data-num="1">1</button>
                <button data-num="2">2</button>
                <button data-num="3">3</button>
    
                <button data-num="4">4</button>
                <button data-num="5">5</button>
                <button data-num="6">6</button>
    
                <button data-num="7">7</button>
                <button data-num="8">8</button>
                <button data-num="9">9</button>
    
                <button class="zero" data-num="0">0</button>
            </div>
        </div>
    
        <button class="enter" id="enterBtn">
            Enter
        </button>
    
    </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
